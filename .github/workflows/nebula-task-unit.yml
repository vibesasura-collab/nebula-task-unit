name: Nebula Task

on:
  workflow_dispatch:
  schedule:
    - cron: "7 0,6,12,18 * * *"

permissions:
  contents: read

concurrency:
  group: nebula-task-unit
  cancel-in-progress: false

jobs:
  run-unit:
    runs-on: ubuntu-latest
    timeout-minutes: 350

    env:
      USER_KEY: ${{ secrets.USER_KEY }}
      ACCESS_KEY: ${{ secrets.ACCESS_KEY }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17
          cache: maven

      - name: Install Google Chrome
        run: |
          sudo apt-get update
          sudo apt-get install -y wget curl unzip gnupg
          wget -q -O - https://dl.google.com/linux/linux_signing_key.pub | sudo gpg --dearmor -o /usr/share/keyrings/googlechrome-linux-keyring.gpg
          echo "deb [arch=amd64 signed-by=/usr/share/keyrings/googlechrome-linux-keyring.gpg] http://dl.google.com/linux/chrome/deb/ stable main" | sudo tee /etc/apt/sources.list.d/google-chrome.list
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable

      - name: Verify Chrome
        run: google-chrome --version

      - name: Run unit
        run: mvn -B -q clean compile exec:java
